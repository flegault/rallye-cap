<!doctype html>
<html lang="fr-CA">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tests règles Rallye-Cap</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:24px;color:#162033}
main{max-width:860px;margin:auto}
.result{border:1px solid #dbe5ef;border-radius:12px;padding:12px;margin:10px 0}
.ok{background:#e6f7ed}.bad{background:#ffe7ea}
pre{white-space:pre-wrap;background:#f8fafc;padding:12px;border-radius:8px}
</style>
</head>
<body>
<main>
<h1>Tests règles Rallye-Cap</h1>
<div id="results"></div>
</main>
<script src="../rules.js"></script>
<script>
const players=['p1','p2','p3','p4','p5','p6','p7','p8'];
const validSchedule=[
  {pos:{p1:'1B',p2:'2B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}},
  {pos:{p2:'1B',p3:'2B',p4:'3B',p7:'AC',p8:'L1',p1:'L2'}},
  {pos:{p3:'1B',p4:'2B',p7:'3B',p8:'AC',p5:'L1',p6:'L2'}},
  {pos:{p5:'1B',p6:'2B',p7:'AC',p8:'3B',p1:'L1',p2:'L2'}}
];

const tests=[
  {
    name:'horaire valide respecte les règles obligatoires',
    run:()=>RallyeCapRules.validateSchedule(validSchedule,players).ok
  },
  {
    name:'détecte 1B plus d’une fois',
    run:()=>RallyeCapRules.validateSchedule([
      {pos:{p1:'1B',p2:'2B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}},
      {pos:{p1:'1B',p3:'2B',p4:'3B',p5:'AC',p7:'L1',p8:'L2'}}
    ],players).violations.some(v=>v.rule==='first-base-once')
  },
  {
    name:'détecte lanceur deux manches consécutives',
    run:()=>RallyeCapRules.validateSchedule([
      {pos:{p1:'1B',p2:'2B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}},
      {pos:{p2:'1B',p3:'2B',p4:'3B',p5:'AC',p6:'L1',p7:'L2'}}
    ],players).violations.some(v=>v.rule==='pitch-consecutive')
  },
  {
    name:'détecte banc deux manches consécutives',
    run:()=>RallyeCapRules.validateSchedule([
      {pos:{p1:'1B',p2:'2B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}},
      {pos:{p1:'2B',p2:'1B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}}
    ],players).violations.some(v=>v.rule==='bench-consecutive')
  },
  {
    name:'détecte une manche avec moins de 6 défenseurs',
    run:()=>RallyeCapRules.validateSchedule([
      {pos:{p1:'1B',p2:'2B',p3:'3B',p4:'AC',p5:'L1'}}
    ],players).violations.some(v=>v.rule==='defense-count')
  },
  {
    name:'détecte une position défensive dupliquée',
    run:()=>RallyeCapRules.validateSchedule([
      {pos:{p1:'1B',p2:'1B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}}
    ],players).violations.some(v=>v.rule==='position-unique')
  },
  {
    name:'détecte une position défensive inconnue',
    run:()=>RallyeCapRules.validateSchedule([
      {pos:{p1:'1B',p2:'2B',p3:'3B',p4:'AC',p5:'L1',p6:'XX'}}
    ],players).violations.some(v=>v.rule==='known-position')
  },
  {
    name:'résume les présences au banc consécutives',
    run:()=>RallyeCapRules.scheduleRuleSummary([
      {pos:{p1:'1B',p2:'2B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}},
      {pos:{p1:'2B',p2:'1B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}}
    ],players).bench.some(v=>v.id==='p7'&&v.i===1)
  },
  {
    name:'résume les joueurs 1B plus d’une fois',
    run:()=>RallyeCapRules.scheduleRuleSummary([
      {pos:{p1:'1B',p2:'2B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}},
      {pos:{p1:'1B',p3:'2B',p4:'3B',p5:'AC',p7:'L1',p8:'L2'}}
    ],players).firstBase.some(v=>v.id==='p1'&&v.ins.length===2)
  },
  {
    name:'résume les lanceurs deux manches consécutives',
    run:()=>RallyeCapRules.scheduleRuleSummary([
      {pos:{p1:'1B',p2:'2B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}},
      {pos:{p2:'1B',p3:'2B',p4:'3B',p5:'AC',p6:'L1',p7:'L2'}}
    ],players).pitch.some(v=>v.id==='p6'&&v.i===1)
  },
  {
    name:'nettoie les joueurs inconnus et positions invalides',
    run:()=>{
      const cleaned=RallyeCapRules.cleanPositions({p1:'1B',p2:'XX',ghost:'2B'},players);
      return cleaned.p1==='1B'&&!('p2' in cleaned)&&!('ghost' in cleaned);
    }
  },
  {
    name:'calcule les statistiques en frappe fixe',
    run:()=>{
      const stats=RallyeCapRules.collectStats(validSchedule,players,{p1:2,p2:2,p3:2,p4:1,p5:1,p6:1,p7:1,p8:1},true);
      return stats.p1.ab===2&&stats.p1.def===3&&stats.p1.bench===1&&stats.p1.total===5&&stats.p1.pos['1B']===1;
    }
  },
  {
    name:'calcule les statistiques en frappe variable sans AB dans le total',
    run:()=>{
      const stats=RallyeCapRules.collectStats(validSchedule,players,{p1:2},false);
      return stats.p1.ab===2&&stats.p1.def===3&&stats.p1.total===3;
    }
  },
  {
    name:'calcule un score d’équité',
    run:()=>{
      const stats=RallyeCapRules.collectStats(validSchedule,players,{p1:2,p2:2,p3:2,p4:1,p5:1,p6:1,p7:1,p8:1},true);
      const fair=RallyeCapRules.fairness(stats,true);
      return fair.overall>0&&fair.totalGap===1&&fair.abGap===1;
    }
  },
  {
    name:'bloque le démarrage avec moins de 6 joueurs actifs',
    run:()=>!RallyeCapRules.startReadiness(validSchedule,players.slice(0,5)).ok
  },
  {
    name:'bloque le démarrage sans manche préparée',
    run:()=>!RallyeCapRules.startReadiness([],players).ok
  },
  {
    name:'bloque le démarrage avec une manche incomplète',
    run:()=>!RallyeCapRules.startReadiness([
      {pos:{p1:'1B',p2:'2B',p3:'3B',p4:'AC',p5:'L1'}}
    ],players).ok
  },
  {
    name:'bloque le démarrage avec une position dupliquée',
    run:()=>!RallyeCapRules.startReadiness([
      {pos:{p1:'1B',p2:'1B',p3:'3B',p4:'AC',p5:'L1',p6:'L2'}}
    ],players).ok
  },
  {
    name:'autorise le démarrage quand l’alignement est prêt',
    run:()=>RallyeCapRules.startReadiness(validSchedule,players).ok
  }
];

const results=document.querySelector('#results');
let failures=0;
tests.forEach(test=>{
  let ok=false,error=null;
  try{ok=Boolean(test.run())}catch(err){error=err;ok=false}
  if(!ok)failures++;
  const div=document.createElement('div');
  div.className='result '+(ok?'ok':'bad');
  div.innerHTML='<strong>'+(ok?'OK':'ÉCHEC')+'</strong> '+test.name+(error?'<pre>'+String(error.stack||error)+'</pre>':'');
  results.appendChild(div);
});
const summary=document.createElement('p');
summary.textContent=failures?failures+' test(s) échoué(s).':'Tous les tests passent.';
results.prepend(summary);
</script>
</body>
</html>
