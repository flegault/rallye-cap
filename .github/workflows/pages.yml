name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        shell: bash
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.FIREBASE_APPCHECK_SITE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cp index.html app.js rules.js firebase-sync.js styles.css dist/
          node -e '
            const fs = require("fs");
            const config = {
              apiKey: process.env.FIREBASE_API_KEY || "",
              authDomain: process.env.FIREBASE_AUTH_DOMAIN || "",
              projectId: process.env.FIREBASE_PROJECT_ID || "",
              appId: process.env.FIREBASE_APP_ID || "",
              appCheckSiteKey: process.env.FIREBASE_APPCHECK_SITE_KEY || ""
            };
            fs.writeFileSync("dist/firebase-config.js", `export default ${JSON.stringify(config, null, 2)};\n`);
          '

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
